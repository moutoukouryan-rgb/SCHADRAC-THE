<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="todo-styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <!-- Header -->
            <div class="header">
                <h1>📝 My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add</button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-label">Total:</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Active:</span>
                    <span class="stat-value" id="activeCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
            </div>

            <!-- To-Do List -->
            <div class="todo-list" id="todoList">
                <div class="empty-state">
                    <p>✨ No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <!-- Clear Completed Button -->
            <div class="action-buttons">
                <button id="clearCompletedBtn" class="clear-btn">Clear Completed</button>
                <button id="clearAllBtn" class="clear-all-btn">Clear All</button>
            </div>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
